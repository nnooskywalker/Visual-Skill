<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | VisualSkill</title>
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
  <link rel="icon" type="image/png" href="../../Asset/mini-logo.png">
  <link rel="stylesheet" href="../../Components/Global/global.css">
  <link rel="stylesheet" href="../../Components/Navbar/navbar.css">
  <link rel="stylesheet" href="../Main/main.css">
  <link rel="stylesheet" href="../../Components/Footer/footer.css">
  <link rel="stylesheet" href="signUp.css">
</head>

<body>
    <!-- NAVBAR -->
    <div id="navbar-container"></div>
    <!-- NAVBAR END -->
    
    <!-- SIGN UP -->
     <section class="signup section-container">

      <video autoplay muted loop playsinline class="bg-video">
        <source src="../../Asset/binaryCode.mp4" type="video/mp4">
      </video>
      
      <div class="signup-container">
        <h2>Create Your Account</h2>

        <form id="signup-form">
          <!-- Email -->
           <div class="form-group">
              <label><i class="ri-mail-line"></i>Email</label>
              <div class="input-wrapper">
                <i class="ri-mail-line"></i>
                <input type="text" id="email" placeholder="Enter your email">
              </div>
              <small class="error" id="email-error"></small>
           </div>

           <!-- Username -->
            <div class="form-group">
              <label><i class="ri-user-line"></i>Username</label>
              <div class="input-wrapper">
                <i class="ri-user-line"></i>
                <input type="text" id="username" placeholder="Enter your username">
              </div>
              <small class="error" id="username-error"></small>
            </div>

            <!-- Birth -->
             <div class="form-group">
              <label><i class="ri-calendar-line"></i>Date of Birth</label>
              <input type="date" id="dob">
              <small class="error" id="dob-error"></small>
             </div>

             <!-- Gender -->
              <div class="form-group">
                <label><i class="ri-men-line"></i>Gender</label>
                <select id="gender">
                  <option value="">-- Select Gender --</option>
                  <option>Male</option>
                  <option>Female</option>
                </select>

                <small class="error" id="gender-error"></small>
              </div>

              <!-- Password -->
               <div class="form-group">
                <label><i class="ri-lock-line"></i>Password</label>
                <div class="input-wrapper">
                  <i class="ri-lock-line"></i>
                  <input type="password" id="password" placeholder="Enter your password">
                  <i class="ri-eye-line toggle-password" data-target="password"></i>
                </div>
                <small class="error" id="password-error"></small>
               </div>

               <!-- Confirm Password -->
                <div class="form-group">
                  <label><i class="ri-lock-line"></i>Confirm Password</label>
                  <div class="input-wrapper">
                    <i class="ri-lock-line"></i>
                    <input type="password" id="confirm-password" placeholder="Repeat your password">
                    <i class="ri-eye-line toggle-password" data-target="confirm-password"></i>
                  </div>
                  <small class="error" id="confirm-error"></small>
                </div>

                <!-- Terms -->
                 <div class="form-group checkbox">
                  <input type="checkbox" id="terms">
                  <label>I agree to terms & conditions</label>
                  <small class="error" id="terms-error"></small>
                 </div>

                 <button type="submit" class="btn signup-btn">Sign Up</button>
        </form>
      </div>
     </section>
    <!-- SIGN UP END -->

    <script src="../../Components/Navbar/navbar.js"></script>
    <script src="../../Components/Global/component.js"></script>
    <script src="signUp.js"></script>
</body>
</html>
